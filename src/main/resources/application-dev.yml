server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.example.authappbackend: DEBUG



